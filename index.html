<!DOCTYPE html>
<meta charset="UTF-8">
<title>AI短剧全自动生成</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui;padding:20px;max-width:700px;margin:0 auto}
.box{background:#222;padding:20px;border-radius:12px;margin-bottom:20px}
textarea{width:100%;height:140px;background:#333;color:#fff;border:none;border-radius:8px;padding:12px}
button{background:#0071e3;color:#fff;border:none;padding:14px 24px;border-radius:10px;cursor:pointer}
.result{background:#333;padding:16px;border-radius:8px;margin-top:16px;white-space:pre-wrap;line-height:1.6}
</style>

<div class="box">
<textarea id="prompt">写一个50秒竖屏赘婿逆袭短剧，严格格式：
镜头X [时长] | 画面 | 台词
结构：钩子→冲突→升级→反转→悬念</textarea>
<br><br>
<button onclick="start()">生成剧本 + 视频</button>
</div>

<div class="box">
<h3>剧本</h3>
<div id="script" class="result">等待生成...</div>
</div>

<div class="box">
<h3>视频结果</h3>
<div id="video" class="result">视频生成中，约1-3分钟...</div>
</div>

<script>
async function start() {
  document.getElementById('script').innerText = '生成中...';
  document.getElementById('video').innerText = '视频生成中...';

  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: document.getElementById('prompt').value })
  });

  const data = await res.json();
  document.getElementById('script').innerText = data.script || '失败';
  document.getElementById('video').innerText = JSON.stringify(data.video, null, 2);
}
</script>
